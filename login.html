<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftSend — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { background: linear-gradient(135deg, #F0FDF9 0%, #E8F5FF 100%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo-icon { width: 52px; height: 52px; background: var(--green); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 22px; font-weight: 700; margin-bottom: 12px; box-shadow: 0 6px 20px rgba(0,200,150,0.3); }
    .auth-logo-name { font-size: 24px; font-weight: 700; color: var(--navy); }
    .auth-logo-tagline { font-size: 13px; color: var(--gray-4); margin-top: 4px; }
    .auth-card { background: var(--white); border-radius: var(--radius-lg); padding: 36px 32px; box-shadow: var(--shadow-lg); }
    .auth-tabs { display: flex; background: var(--gray-1); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
    .auth-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--gray-4); transition: all 0.2s; border: none; background: none; font-family: 'Lexend', sans-serif; }
    .auth-tab.active { background: var(--white); color: var(--text); box-shadow: var(--shadow-sm); }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .auth-form.hidden { display: none; }
    .divider-or { display: flex; align-items: center; gap: 12px; color: var(--gray-3); font-size: 13px; margin: 4px 0; }
    .divider-or::before, .divider-or::after { content: ''; flex: 1; height: 1px; background: var(--gray-2); }
    .forgot-link { font-size: 13px; color: var(--green); text-decoration: none; text-align: right; display: block; margin-top: -8px; }
    .forgot-link:hover { text-decoration: underline; }
    .terms { font-size: 12px; color: var(--gray-3); text-align: center; line-height: 1.6; }
    .terms a { color: var(--green); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-box fade-in">
    <div class="auth-logo">
      <div class="auth-logo-icon">S</div>
      <div class="auth-logo-name">SwiftSend</div>
      <div class="auth-logo-tagline">Card to bank — fast, simple, secure</div>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required />
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
        <div class="divider-or">or</div>
        <p class="terms">Don't have an account? <a href="#" onclick="switchTab('signup')">Create one</a></p>
      </form>

      <!-- SIGNUP FORM -->
      <form class="auth-form hidden" id="signup-form" onsubmit="handleSignup(event)">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">First name</label>
            <input type="text" class="form-input" id="signup-firstname" placeholder="John" required />
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input type="text" class="form-input" id="signup-lastname" placeholder="Doe" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Phone number</label>
          <input type="tel" class="form-input" id="signup-phone" placeholder="08012345678" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="Min. 8 characters" minlength="8" required />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input type="password" class="form-input" id="signup-confirm" placeholder="Repeat your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signup-btn">Create Account</button>
        <p class="terms">By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></p>
      </form>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/utils.js"></script>
  <script>
    // Redirect if already logged in
    if (getSession()) window.location.href = 'dashboard.html';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      // Check if user exists in localStorage (demo auth)
      const users = JSON.parse(localStorage.getItem('ss_users') || '[]');
      const user = users.find(u => u.email === email && u.password === password);
      if (!user) { showToast('Invalid email or password', 'error'); return; }

      btn.textContent = 'Signing in…'; btn.disabled = true;
      setTimeout(() => {
        saveSession(user);
        window.location.href = 'dashboard.html';
      }, 800);
    }

    function handleSignup(e) {
      e.preventDefault();
      const firstName = document.getElementById('signup-firstname').value.trim();
      const lastName  = document.getElementById('signup-lastname').value.trim();
      const email     = document.getElementById('signup-email').value.trim();
      const phone     = document.getElementById('signup-phone').value.trim();
      const password  = document.getElementById('signup-password').value;
      const confirm   = document.getElementById('signup-confirm').value;
      const btn = document.getElementById('signup-btn');

      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }

      const users = JSON.parse(localStorage.getItem('ss_users') || '[]');
      if (users.find(u => u.email === email)) { showToast('Email already registered', 'error'); return; }

      btn.textContent = 'Creating account…'; btn.disabled = true;
      const newUser = { name: firstName + ' ' + lastName, email, phone, password, createdAt: new Date().toISOString() };
      users.push(newUser);
      localStorage.setItem('ss_users', JSON.stringify(users));

      setTimeout(() => {
        saveSession(newUser);
        showToast('Account created!', 'success');
        window.location.href = 'dashboard.html';
      }, 900);
    }
  </script>
</body>
</html>
