<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftSend — History</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .history-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .h-stat { background: var(--white); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); }
    .h-stat-label { font-size: 12px; color: var(--gray-4); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .h-stat-value { font-size: 22px; font-weight: 700; color: var(--navy); margin-top: 6px; }
    @media (max-width: 700px) { .history-stats { grid-template-columns: repeat(2, 1fr); } }

    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 8px 18px; border-radius: 99px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--gray-2); background: var(--white); color: var(--gray-4); transition: all 0.15s; font-family: 'Lexend', sans-serif; }
    .filter-tab.active { background: var(--navy); color: white; border-color: var(--navy); }

    .tx-table { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
    .tx-table-header { display: grid; grid-template-columns: 1fr 140px 120px 100px 90px; gap: 12px; padding: 14px 20px; background: var(--gray-1); font-size: 12px; font-weight: 600; color: var(--gray-4); text-transform: uppercase; letter-spacing: 0.4px; }
    .tx-table-row { display: grid; grid-template-columns: 1fr 140px 120px 100px 90px; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--gray-1); align-items: center; transition: background 0.1s; cursor: pointer; }
    .tx-table-row:last-child { border-bottom: none; }
    .tx-table-row:hover { background: var(--gray-1); }
    .tx-table-row .recipient { display: flex; align-items: center; gap: 10px; }
    .tx-table-row .r-avatar { width: 34px; height: 34px; border-radius: 8px; background: var(--green-light); color: var(--green); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .tx-table-row .r-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .tx-table-row .r-bank { font-size: 12px; color: var(--gray-3); margin-top: 1px; }
    .tx-table-row .amount { font-size: 14px; font-weight: 600; color: var(--red); }
    .tx-table-row .date  { font-size: 12px; color: var(--gray-4); }
    .tx-table-row .ref   { font-size: 11px; color: var(--gray-3); font-family: monospace; }

    @media (max-width: 768px) {
      .tx-table-header { display: none; }
      .tx-table-row { grid-template-columns: 1fr auto; grid-template-rows: auto auto; gap: 4px 12px; }
      .tx-table-row .recipient { grid-column: 1; grid-row: 1; }
      .tx-table-row .amount { grid-column: 2; grid-row: 1; }
      .tx-table-row .date { grid-column: 1; grid-row: 2; color: var(--gray-3); }
      .tx-table-row .status { grid-column: 2; grid-row: 2; justify-self: end; }
      .tx-table-row .ref { display: none; }
    }

    /* Detail modal */
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-1); font-size: 14px; }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--gray-4); }
    .detail-row span:last-child  { font-weight: 500; text-align: right; }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <aside class="sidebar">
      <div class="sidebar-logo"><div class="sidebar-logo-icon">S</div><span class="sidebar-logo-name">SwiftSend</span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
        <a href="transfer.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>New Transfer</a>
        <a href="beneficiaries.html" class="nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Beneficiaries</a>
        <a href="history.html" class="nav-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>History</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-card"><div class="user-avatar" id="sidebar-avatar">U</div><div class="user-info"><div class="user-name" id="sidebar-name">User</div><div class="user-email" id="sidebar-email"></div></div></div>
        <button onclick="logout()" class="btn btn-secondary btn-full btn-sm mt-8" style="justify-content:flex-start;gap:8px;"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign out</button>
      </div>
    </aside>

    <main class="main-content fade-in">
      <div class="page-header">
        <div class="page-title">Transaction History</div>
        <div class="page-subtitle">All your past transfers</div>
      </div>

      <!-- Stats -->
      <div class="history-stats">
        <div class="h-stat"><div class="h-stat-label">Total Transferred</div><div class="h-stat-value" id="stat-total">₦0</div></div>
        <div class="h-stat"><div class="h-stat-label">Successful</div><div class="h-stat-value text-green" id="stat-success">0</div></div>
        <div class="h-stat"><div class="h-stat-label">Pending</div><div class="h-stat-value" style="color:var(--amber);" id="stat-pending">0</div></div>
        <div class="h-stat"><div class="h-stat-label">Failed</div><div class="h-stat-value text-red" id="stat-failed">0</div></div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterTxs('all', this)">All</button>
        <button class="filter-tab" onclick="filterTxs('success', this)">Successful</button>
        <button class="filter-tab" onclick="filterTxs('pending', this)">Pending</button>
        <button class="filter-tab" onclick="filterTxs('failed', this)">Failed</button>
      </div>

      <!-- Table -->
      <div class="tx-table">
        <div class="tx-table-header">
          <span>Recipient</span><span>Amount</span><span>Date</span><span>Status</span><span>Reference</span>
        </div>
        <div id="tx-rows"></div>
        <div id="tx-empty" class="empty-state" style="display:none;padding:60px 20px;">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:48px;height:48px;margin:0 auto 12px;display:block;opacity:0.3;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <p style="font-size:14px;color:var(--gray-3);">No transactions found</p>
        </div>
      </div>
    </main>
  </div>

  <nav class="mobile-nav"><div class="mobile-nav-inner">
    <a href="dashboard.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home</a>
    <a href="transfer.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>Transfer</a>
    <a href="beneficiaries.html" class="mobile-nav-item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Saved</a>
    <a href="history.html" class="mobile-nav-item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>History</a>
  </div></nav>

  <!-- Detail modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal">
      <div class="modal-header"><div class="modal-title">Transaction Details</div><button class="modal-close" onclick="document.getElementById('detail-modal').classList.remove('open')">×</button></div>
      <div id="detail-content"></div>
      <div style="margin-top:24px;display:flex;gap:12px;">
        <button onclick="document.getElementById('detail-modal').classList.remove('open')" class="btn btn-secondary btn-full">Close</button>
        <a href="transfer.html" class="btn btn-primary btn-full">New Transfer</a>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="js/utils.js"></script>
  <script>
    requireAuth(); initSidebar();
    let currentFilter = 'all';

    function renderStats() {
      const txs = getTransactions();
      const success = txs.filter(t => t.status === 'success');
      document.getElementById('stat-total').textContent = formatNaira(success.reduce((s,t) => s+t.amount, 0));
      document.getElementById('stat-success').textContent = success.length;
      document.getElementById('stat-pending').textContent = txs.filter(t => t.status === 'pending').length;
      document.getElementById('stat-failed').textContent  = txs.filter(t => t.status === 'failed').length;
    }

    function renderTxs(filter) {
      const txs = getTransactions();
      const filtered = filter === 'all' ? txs : txs.filter(t => t.status === filter);
      const rows = document.getElementById('tx-rows');
      const empty = document.getElementById('tx-empty');

      if (!filtered.length) { rows.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      rows.innerHTML = filtered.map((t, i) => `
        <div class="tx-table-row" onclick="showDetail(${getTransactions().indexOf(t)})">
          <div class="recipient">
            <div class="r-avatar">${(t.recipientName||'?')[0]}</div>
            <div><div class="r-name">${t.recipientName || 'Unknown'}</div><div class="r-bank">${t.bankName || ''}</div></div>
          </div>
          <div class="amount">${formatNaira(t.amount)}</div>
          <div class="date">${formatDate(t.date)}</div>
          <div class="status"><span class="chip chip-${t.status}">${t.status}</span></div>
          <div class="ref">${(t.reference||'—').slice(0,12)}…</div>
        </div>`).join('');
    }

    function filterTxs(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderTxs(f);
    }

    function showDetail(i) {
      const t = getTransactions()[i];
      if (!t) return;
      const swift = calcFee(t.amount);
      const ps = calcPaystackFee(t.amount);
      document.getElementById('detail-content').innerHTML = `
        <div style="text-align:center;margin-bottom:20px;">
          <div style="width:56px;height:56px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:24px;background:${ t.status==='success'?'var(--green-light)':t.status==='pending'?'#FFF8E6':'#FFF0F0' };">${ t.status==='success'?'✅':t.status==='pending'?'⏳':'❌' }</div>
          <div style="font-size:24px;font-weight:700;color:var(--navy);">${formatNaira(t.amount)}</div>
          <span class="chip chip-${t.status}" style="margin-top:6px;">${t.status}</span>
        </div>
        <div class="detail-row"><span>Recipient</span><span>${t.recipientName||'—'}</span></div>
        <div class="detail-row"><span>Bank</span><span>${t.bankName||'—'}</span></div>
        <div class="detail-row"><span>Account No.</span><span>${t.accountNumber||'—'}</span></div>
        <div class="detail-row"><span>Transfer Amount</span><span>${formatNaira(t.amount)}</span></div>
        <div class="detail-row"><span>SwiftSend Fee</span><span>${formatNaira(swift)}</span></div>
        <div class="detail-row"><span>Paystack Fee</span><span>${formatNaira(ps)}</span></div>
        <div class="detail-row"><span>Total Charged</span><span style="color:var(--red);font-weight:700;">${formatNaira(t.amount+swift+ps)}</span></div>
        <div class="detail-row"><span>Date</span><span>${formatDate(t.date)}</span></div>
        <div class="detail-row"><span>Reference</span><span style="font-family:monospace;font-size:12px;">${t.reference||'—'}</span></div>`;
      document.getElementById('detail-modal').classList.add('open');
    }

    renderStats();
    renderTxs('all');
  </script>
</body>
</html>
